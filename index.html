<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Architect Prime | Noucair B.</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="fixed-body"> <div id="sentinel" class="sentinel-gate">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center font-black mb-6 shadow-2xl text-white">N</div>
        
        <div class="flex flex-col items-center gap-4 w-full max-w-[300px] px-4">
            <input type="password" id="access-key" class="pass-input w-full" placeholder="MASTER KEY" inputmode="numeric" oninput="checkProtocol(this.value)">
            
            <div class="h-[1px] w-12 bg-white/10 my-2"></div>
            
            <input type="text" id="req-name" class="prime-input w-full" placeholder="NAME">
            <input type="email" id="req-email" class="prime-input w-full" placeholder="EMAIL">
            
            <button id="submit-btn" class="btn-gen w-full">REQUEST ACCESS</button>
        </div>
    </div>

    <div class="app-shell flex-col lg:flex-row">
        <main class="viewport-stage order-1 lg:order-2">
            <div class="glass-pub">
                <div class="brand-sig">BY NOUCAIR B.</div>
                <div class="nav-links hidden md:flex">
                    <span class="nav-link">ALLTHINKERS</span>
                    <span class="nav-link">ANDROMEDERS</span>
                </div>
            </div>

            <div class="canvas-container">
                <div class="qr-canvas-object">
                    <canvas id="output-canvas"></canvas>
                </div>
            </div>

            <div class="action-dock pb-8">
                <button onclick="handleDownload()" class="btn-main">SAVE PNG</button>
                <button onclick="update()" class="btn-main-alt">REFRESH</button>
                <div id="qrcode-raw" class="hidden"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
