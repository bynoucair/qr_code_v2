<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Architect Prime | Noucair B.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sentinel" class="sentinel-gate">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center font-black mb-8 shadow-2xl text-white">N</div>
        <div class="flex flex-col items-center gap-4 w-[300px]">
            <input type="password" id="access-key" class="pass-input w-full" placeholder="ENTER MASTER KEY" oninput="checkProtocol(this.value)">
            <p class="text-[8px] font-bold text-blue-500 uppercase tracking-widest mt-4">Authorized Access Only</p>
        </div>
    </div>

    <div class="app-shell">
        <button id="mobile-toggle" onclick="toggleSidebar()" class="lg:hidden fixed bottom-6 right-6 z-[3000] bg-blue-600 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white font-bold text-[10px] tracking-tighter">
            TUNE
        </button>

        <aside id="sidebar" class="sidebar">
            <div class="p-8 border-b border-white/5 flex items-center justify-between">
                <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-white">Tuning Hub</h1>
                <button onclick="toggleSidebar()" class="lg:hidden text-white/40 text-[10px] uppercase font-bold">Close</button>
            </div>

            <div class="scroll-container">
                <div class="bento-group">
                    <label class="label-tiny">01. Source & Caption</label>
                    <input type="text" id="qr-input" value="https://allthinkers.com" class="prime-input" oninput="update()">
                    <input type="text" id="qr-caption" value="ACCESS ECOSYSTEM" class="prime-input" oninput="update()">
                </div>

                <div class="bento-group">
                    <label class="label-tiny">02. Brand Color</label>
                    <input type="color" id="qr-color" value="#3b82f6" class="w-full h-10 bg-transparent border-none mt-2 cursor-pointer" oninput="update()">
                </div>

                <div class="bento-group">
                    <label class="label-tiny">03. Spatial Tuning (Size & Font)</label>
                    <p class="text-[8px] text-white/40 mt-2">Scale</p>
                    <input type="range" id="qr-scale" min="0.4" max="0.8" step="0.01" value="0.72" class="w-full" oninput="update()">
                    <p class="text-[8px] text-white/40 mt-2">Font Size</p>
                    <input type="range" id="qr-font" min="20" max="64" step="1" value="42" class="w-full" oninput="update()">
                </div>
                
                <button onclick="handleDownload()" class="btn-gen">Download PNG</button>
            </div>
        </aside>

        <main class="viewport-stage">
            <div class="glass-pub">
                <div class="brand-sig"><div class="dot-status"></div>BY NOUCAIR B.</div>
                <div class="nav-links">
                    <span class="nav-link text-[8px]">ALLTHINKERS</span>
                    <span class="nav-link text-[8px]">ANDROMEDERS</span>
                </div>
            </div>

            <div class="canvas-container">
                <div class="qr-canvas-object">
                    <canvas id="output-canvas"></canvas>
                </div>
            </div>
            <div id="qrcode-raw" class="hidden"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
